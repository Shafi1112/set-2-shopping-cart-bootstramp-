<!DOCTYPE html>
<html lang="en">
<head>
  <title>Catalog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark p-3">
  <a class="navbar-brand text-white">Catalog</a>
  <a href="index.html" class="btn btn-light">Home</a>
</nav>

<div class="container mt-4">

  <div class="row">

    <!-- Product 1 -->
    <div class="col-md-4">
      <div class="card">
        <img src="https://via.placeholder.com/150" class="card-img-top">
        <div class="card-body text-center">
          <h5>Product 1</h5>
          <p>₹500</p>
          <button class="btn btn-primary">Add to Cart</button>
        </div>
      </div>
    </div>

    <!-- Product 2 -->
    <div class="col-md-4">
      <div class="card">
        <img src="https://via.placeholder.com/150" class="card-img-top">
        <div class="card-body text-center">
          <h5>Product 2</h5>
          <p>₹800</p>
          <button class="btn btn-primary">Add to Cart</button>
        </div>
      </div>
    </div>

  </div>

  <hr>

  <!-- Static Cart -->
  <h3>Cart (Demo Only)</h3>
  <ul class="list-group">
    <li class="list-group-item">Product 1 - ₹500</li>
    <li class="list-group-item">Product 2 - ₹800</li>
  </ul>

  <h4 class="mt-3">Total: ₹1300</h4>

</div>

</body>
</html>
