<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 col-md-4">
  <div class="card p-4">
    <h3 class="text-center">Login</h3>

    <form action="catalog.html">
      <input type="text" class="form-control my-2" placeholder="Username" required>
      <input type="password" class="form-control my-2" placeholder="Password" required>

      <button class="btn btn-primary w-100">Login</button>
    </form>

    <p class="mt-3 text-center">
      No account? <a href="register.html">Register</a>
    </p>
  </div>
</div>

</body>
</html>
